<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BuyIt</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #fff;
            overflow: hidden;
            cursor: none;
        }

        .cursor {
            width: 40px;
            height: 40px;
            border: 2px solid #7c3aed;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.15s ease;
            mix-blend-mode: difference;
        }

        .cursor.hover {
            transform: scale(1.5);
            background: rgba(124, 58, 237, 0.3);
            border-color: #fff;
        }

        .login-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
        }

        .form-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            background: #09090b;
            animation: slideInLeft 1s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .form-side::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
            filter: blur(60px);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, 30px); }
        }

        .logo-small {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 60px;
            animation: fadeIn 1s 0.3s both;
        }

        .logo-icon-small {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 900;
        }

        .form-wrapper {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }

        .form-title {
            font-family: 'Outfit', sans-serif;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 1s 0.5s both;
        }

        .form-subtitle {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            animation: fadeIn 1s 0.7s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
            animation: fadeIn 1s 0.9s both;
        }

        .input-field {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
            cursor: none;
        }

        .input-field:focus {
            outline: none;
            border-color: #7c3aed;
            background: rgba(255, 255, 255, 0.05);
        }

        .input-field:focus + .floating-label,
        .input-field:not(:placeholder-shown) + .floating-label {
            top: -10px;
            font-size: 12px;
            color: #7c3aed;
        }

        .floating-label {
            position: absolute;
            left: 20px;
            top: 18px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            transition: all 0.3s;
            background: #09090b;
            padding: 0 5px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            animation: fadeIn 1s 1.1s both;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.5);
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
            animation: fadeIn 1s 1.3s both;
        }

        .forgot-password a {
            color: #7c3aed;
            text-decoration: none;
            cursor: none;
            transition: all 0.3s;
        }

        .forgot-password a:hover {
            color: #8b5cf6;
        }

        .register-link {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.6);
            animation: fadeIn 1s 1.5s both;
        }

        .register-link a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 600;
        }

        .visual-side {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            animation: slideInRight 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .visual-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(124,58,237,0.1)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            opacity: 0.3;
        }

        .rotating-logo {
            width: 300px;
            height: 300px;
            position: relative;
            animation: rotate3D 20s linear infinite;
            transform-style: preserve-3d;
            margin-bottom: 40px;
        }

        @keyframes rotate3D {
            from { transform: rotateY(0deg) rotateX(20deg); }
            to { transform: rotateY(360deg) rotateX(20deg); }
        }

        .logo-hexagon {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 30px 80px rgba(124, 58, 237, 0.6);
            position: relative;
        }

        .logo-hexagon::before {
            content: 'BuyIt';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Outfit', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: #fff;
        }

        .visual-text {
            text-align: center;
            z-index: 1;
            animation: fadeIn 2s 0.5s both;
        }

        .visual-title {
            font-family: 'Outfit', sans-serif;
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            max-width: 400px;
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #7c3aed;
            border-radius: 50%;
            animation: particleFloat 15s linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        @media (max-width: 968px) {
            .login-container { grid-template-columns: 1fr; }
            .visual-side { display: none; }
            .form-side { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="cursor"></div>

    <div class="login-container">
        <div class="form-side">
            <div class="logo-small">
                <div class="logo-icon-small"></div>
                <span class="logo-text">BuyIt</span>
            </div>

            <div class="form-wrapper">
                <h1 class="form-title">Welcome Back</h1>
                <p class="form-subtitle">Sign in to continue your journey</p>

                <form action="login.php" method="POST">
                    <div class="input-group">
                        <input type="email" class="input-field" placeholder=" " name="email" required>
                        <label class="floating-label">Email Address</label>
                    </div>

                    <div class="input-group">
                        <input type="password" class="input-field" placeholder=" " name="password" required>
                        <label class="floating-label">Password</label>
                    </div>

                    <button type="submit" class="submit-btn">
                        <span style="position: relative; z-index: 1;">Sign In</span>
                    </button>
                </form>

                <div class="forgot-password">
                    <a href="forgot.php">Forgot Password?</a>
                </div>

                <div class="register-link">
                    Don't have an account? <a href="register.html">Create one</a>
                </div>
            </div>
        </div>

        <div class="visual-side">
            <div class="visual-bg"></div>
            
            <div class="particles">
                <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
                <div class="particle" style="left: 30%; animation-delay: 2s;"></div>
                <div class="particle" style="left: 50%; animation-delay: 4s;"></div>
                <div class="particle" style="left: 70%; animation-delay: 6s;"></div>
                <div class="particle" style="left: 90%; animation-delay: 8s;"></div>
            </div>

            <div class="rotating-logo">
                <div class="logo-hexagon"></div>
            </div>

            <div class="visual-text">
                <h2 class="visual-title">FUTURE IS NOW</h2>
                <p class="visual-subtitle">Experience the next generation of e-commerce</p>
            </div>
        </div>
    </div>

    <script>
        const cursor = document.querySelector('.cursor');
        const hoverElements = document.querySelectorAll('a, button, input');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 20 + 'px';
            cursor.style.top = e.clientY - 20 + 'px';
        });

        hoverElements.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('focus', function() {
                this.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function() {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
