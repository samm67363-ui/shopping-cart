<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", system-ui, sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #2563eb, #1e40af);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Background animation */
.bg-circle {
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    animation: float 8s ease-in-out infinite;
}

.bg-circle.one { top: -120px; left: -120px; }
.bg-circle.two { bottom: -150px; right: -150px; animation-delay: 3s; }

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-30px); }
}

/* Card */
.card {
    background: #ffffff;
    width: 100%;
    max-width: 400px;
    padding: 35px;
    border-radius: 14px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.2);
    animation: slideUp 0.8s ease;
    position: relative;
    z-index: 1;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    text-align: center;
    margin-bottom: 6px;
    font-weight: 600;
}

.subtitle {
    text-align: center;
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 25px;
}

/* Floating input */
.field {
    position: relative;
    margin-bottom: 20px;
}

.field input {
    width: 100%;
    padding: 14px 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    outline: none;
}

.field label {
    position: absolute;
    top: 50%;
    left: 12px;
    color: #6b7280;
    font-size: 14px;
    transform: translateY(-50%);
    pointer-events: none;
    transition: 0.25s;
    background: white;
    padding: 0 6px;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label {
    top: -7px;
    font-size: 12px;
    color: #2563eb;
}

.field input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

/* Button */
button {
    width: 100%;
    padding: 13px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1e40af;
    transform: translateY(-1px);
}

button:active {
    transform: scale(0.98);
}

/* Links */
.back-link {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
}

.back-link a {
    text-decoration: none;
    color: #2563eb;
    font-weight: 500;
}

.info-text {
    font-size: 13px;
    color: #6b7280;
    text-align: center;
    margin-bottom: 18px;
}
</style>
</head>

<body>

<div class="bg-circle one"></div>
<div class="bg-circle two"></div>

<div class="card">
    <h2>Forgot Password</h2>
    <p class="subtitle">We’ll help you reset it</p>
    <p class="info-text">
        Enter your registered email address and we’ll send you a reset link.
    </p>

    <form action="forgot.php" method="POST">
        <div class="field">
            <input type="email" name="email" required placeholder=" ">
            <label>Email Address</label>
        </div>

        <button type="submit">Send Reset Link</button>
    </form>

    <div class="back-link">
        <a href="login-kinetic.html">← Back to login</a>
    </div>
</div>

</body>
</html>
